server {
  server_name tawaf.barikoimaps.com;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Next.js specific headers
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Proxy settings for WebSocket support (Next.js hot reload)
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  location / {
    proxy_pass http://127.0.0.1:3000/;
  }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tawaf.barikoimaps.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tawaf.barikoimaps.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = tawaf.barikoimaps.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  server_name tawaf.barikoimaps.com;

  listen 80;
  listen [::]:80;
    return 404; # managed by Certbot
}
